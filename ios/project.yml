name: beneon
options:
  bundleIdPrefix: com.smkjason
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""

targets:
  beneon:
    type: application
    platform: iOS
    sources:
      - path: beneon/Sources
    resources:
      - path: beneon/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smkjason.beneon
        INFOPLIST_FILE: beneon/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
